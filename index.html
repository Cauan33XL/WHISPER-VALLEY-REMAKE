<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whisper Valley</title>
  <link rel="shortcut icon" href="/assets/favicon/favicon.ico" type="image/x-icon">
  <style>
    body {
      margin: 0;
      background-color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      color: white;
      font-family: monospace;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    canvas {
      border: 2px solid #fff;
      image-rendering: pixelated;
      display: block;
    }

    /* Utilitários para overlay (puzzles e dialogos HTML) */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none; /* Deixa o clique passar pro canvas se necessário */
    }

    .ui-layer {
      pointer-events: auto; 
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Phaser criará o canvas aqui dentro automaticamente devido à config do parent -->
  </div>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
